<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600" role="img" aria-label="NaviCore pin map">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f1626"></stop><stop offset="1" stop-color="#080b10"></stop></linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#16202e"></stop><stop offset="1" stop-color="#0e1622"></stop></linearGradient>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5cb0ff"></path></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#8b94a1"></path></marker>
  </defs>
  

  <rect width="1000" height="600" rx="16" fill="url(#bg)"></rect>
  <text x="40" y="50" class="lbl h" font-size="24" fill="#eef1f5">Pin map — WCB v3.2 (ESP32-S3)</text>
  <text x="40" y="76" class="mono" font-size="13" fill="#6c7686">TX pins confirmed · RX pins &amp; LED marked “verify against schematic” in firmware</text>

  
  <rect x="400" y="150" width="200" height="340" rx="14" fill="url(#board)" stroke="#2b86ff" stroke-width="1.5"></rect>
  <rect x="468" y="120" width="64" height="36" rx="6" fill="#0d1117" stroke="#3a5170"></rect>
  <text x="500" y="143" text-anchor="middle" class="mono" font-size="11" fill="#9cc6f5">USB-C</text>
  <text x="500" y="300" text-anchor="middle" class="lbl h" font-size="18" fill="#eaf6ff">NaviCore</text>
  <text x="500" y="322" text-anchor="middle" class="mono" font-size="11" fill="#6c8db0">WCB 3.2</text>
  <circle cx="500" cy="360" r="7" fill="#2b86ff"></circle>
  <text x="500" y="392" text-anchor="middle" class="mono" font-size="10" fill="#6c7686">NeoPixel GPIO48</text>

  
  <g class="mono" font-size="13">
    
    <line x1="400" y1="200" x2="300" y2="200" stroke="#5cb0ff" stroke-width="2.5" marker-start="url(#a)"></line>
    <text x="290" y="196" text-anchor="end" class="pin" fill="#5cb0ff">GPIO5</text>
    <text x="290" y="214" text-anchor="end" fill="#c3cbd6">SBUS IN · Serial1 RX</text>
    <text x="60" y="196" class="lbl" font-size="13" fill="#8a93a1">from receiver →</text>

    
    <line x1="400" y1="250" x2="300" y2="250" stroke="#5cb0ff" stroke-width="2.5" marker-start="url(#a)"></line>
    <text x="290" y="246" text-anchor="end" class="pin" fill="#5cb0ff">USB</text>
    <text x="290" y="264" text-anchor="end" fill="#c3cbd6">config tool · debug</text>
    <text x="60" y="246" class="lbl" font-size="13" fill="#8a93a1">PC (Web Serial) ↔</text>
  </g>

  
  <g class="mono" font-size="13">
    
    <line x1="600" y1="190" x2="700" y2="190" stroke="#8b94a1" stroke-width="2" marker-end="url(#ag)" stroke-dasharray="4 4"></line>
    <text x="710" y="186" class="pin" fill="#aab3bf">GPIO9</text>
    <text x="710" y="204" fill="#c3cbd6">SBUS OUT passthrough · UART0</text>
    <text x="710" y="220" fill="#5d6573">100k 8E2 inverted</text>

    
    <line x1="600" y1="258" x2="700" y2="258" stroke="#5cb0ff" stroke-width="2.5" marker-end="url(#a)"></line>
    <text x="710" y="254" class="pin" fill="#5cb0ff">GPIO6</text>
    <text x="710" y="272" fill="#c3cbd6">Local Maestro TX · Serial2</text>
    <text x="710" y="288" fill="#5d6573">RX GPIO7 · 115200</text>

    
    <line x1="600" y1="326" x2="700" y2="326" stroke="#5cb0ff" stroke-width="2.5" marker-end="url(#a)"></line>
    <text x="710" y="322" class="pin" fill="#5cb0ff">GPIO15</text>
    <text x="710" y="340" fill="#c3cbd6">Aux S3 TX · SoftwareSerial</text>
    <text x="710" y="356" fill="#5d6573">RX GPIO16 · ≤57600</text>

    
    <line x1="600" y1="394" x2="700" y2="394" stroke="#5cb0ff" stroke-width="2.5" marker-end="url(#a)"></line>
    <text x="710" y="390" class="pin" fill="#5cb0ff">GPIO17</text>
    <text x="710" y="408" fill="#c3cbd6">Aux S4 TX · SoftwareSerial</text>
    <text x="710" y="424" fill="#5d6573">RX GPIO18 · ≤57600</text>
  </g>

  
  <g class="lbl" font-size="12" fill="#6c8db0">
    <text x="990" y="204" text-anchor="end">→ downstream SBUS device</text>
    <text x="990" y="272" text-anchor="end">→ servos</text>
    <text x="990" y="340" text-anchor="end">→ HCR / MP3 / serial</text>
    <text x="990" y="408" text-anchor="end">→ HCR / MP3 / serial</text>
  </g>

  
  <g class="mono" font-size="12">
    <line x1="40" y1="520" x2="78" y2="520" stroke="#5cb0ff" stroke-width="2.5"></line>
    <text x="86" y="524" fill="#6c7686">data / command (wired)</text>
    <line x1="320" y1="520" x2="358" y2="520" stroke="#8b94a1" stroke-width="2" stroke-dasharray="4 4"></line>
    <text x="366" y="524" fill="#6c7686">SBUS passthrough</text>
  </g>
  <text x="40" y="556" class="mono" font-size="12" fill="#5d6573">Remote Maestros &amp; WCB boards need no wire — they’re reached over ESP-NOW. Share GND with every wired peripheral.</text>
</svg>