<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-label="NaviCore signal flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f1626"></stop><stop offset="1" stop-color="#080b10"></stop></linearGradient>
    <linearGradient id="coreFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#163150"></stop><stop offset="1" stop-color="#0d2138"></stop></linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7cc0ff"></stop><stop offset="1" stop-color="#1547b0"></stop></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5cb0ff"></path></marker>
    <marker id="arrowS" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b94a1"></path></marker>
  </defs>
  

  <rect width="1180" height="560" rx="16" fill="url(#bg)"></rect>
  <text x="40" y="52" class="lbl h" font-size="24" fill="#eef1f5">How NaviCore moves a signal</text>
  <text x="40" y="78" class="mono" font-size="14" fill="#6c7686">radio → SBUS → decode → dispatch → your droid hardware</text>

  
  <g>
    <rect x="40" y="150" width="170" height="120" rx="12" fill="#121822" stroke="#2c3849"></rect>
    <text x="125" y="196" text-anchor="middle" class="lbl h" font-size="17" fill="#eef1f5">Transmitter</text>
    <text x="125" y="220" text-anchor="middle" class="mono" font-size="12" fill="#8a93a1">FrSky X18 / X20</text>
    <text x="125" y="238" text-anchor="middle" class="mono" font-size="12" fill="#8a93a1">/ Twin X-Lite</text>
  </g>
  <text x="232" y="200" class="mono" font-size="11" fill="#5cb0ff">RF</text>
  <line x1="210" y1="210" x2="270" y2="210" stroke="#8b94a1" stroke-width="2" marker-end="url(#arrowS)" stroke-dasharray="4 4"></line>

  
  <g>
    <rect x="272" y="150" width="150" height="120" rx="12" fill="#121822" stroke="#2c3849"></rect>
    <text x="347" y="196" text-anchor="middle" class="lbl h" font-size="17" fill="#eef1f5">Receiver</text>
    <text x="347" y="220" text-anchor="middle" class="mono" font-size="12" fill="#8a93a1">SBUS out</text>
    <text x="347" y="238" text-anchor="middle" class="mono" font-size="12" fill="#8a93a1">16 / 24 ch</text>
  </g>
  <text x="440" y="198" class="mono" font-size="11" fill="#5cb0ff">SBUS · GPIO5</text>
  <line x1="422" y1="210" x2="486" y2="210" stroke="#5cb0ff" stroke-width="2.5" marker-end="url(#arrow)"></line>

  
  <g>
    <rect x="488" y="120" width="230" height="180" rx="14" fill="url(#coreFill)" stroke="#2b86ff" stroke-width="1.5"></rect>
    <text x="603" y="158" text-anchor="middle" class="lbl h" font-size="19" fill="#eaf6ff">NaviCore</text>
    <text x="603" y="180" text-anchor="middle" class="mono" font-size="11.5" fill="#9cc6f5">WCB v3.2 · ESP32-S3</text>
    <line x1="512" y1="196" x2="694" y2="196" stroke="#24486f" stroke-width="1"></line>
    <text x="603" y="218" text-anchor="middle" class="mono" font-size="12" fill="#cfe0f5">decode channels</text>
    <text x="603" y="238" text-anchor="middle" class="mono" font-size="12" fill="#cfe0f5">mode 1·2·3 + multi-tap</text>
    <text x="603" y="258" text-anchor="middle" class="mono" font-size="12" fill="#cfe0f5">map → actions</text>
    <text x="603" y="282" text-anchor="middle" class="mono" font-size="11" fill="#6c8db0">NVS-stored config</text>
  </g>

  
  <text x="603" y="350" text-anchor="middle" class="mono" font-size="11" fill="#8a93a1">SBUS OUT passthrough · GPIO9</text>
  <line x1="603" y1="300" x2="603" y2="338" stroke="#8b94a1" stroke-width="2" marker-end="url(#arrowS)" stroke-dasharray="4 4"></line>

  
  <text x="430" y="92" class="mono" font-size="11" fill="#5cb0ff">USB · Web Serial</text>
  <line x1="540" y1="120" x2="540" y2="92" stroke="#5cb0ff" stroke-width="2" stroke-dasharray="3 3"></line>
  <rect x="430" y="40" width="220" height="40" rx="9" fill="#121822" stroke="#2c3849"></rect>
  <text x="540" y="65" text-anchor="middle" class="lbl" font-size="13" fill="#c3cbd6">Config tool (browser)</text>

  
  <line x1="718" y1="210" x2="772" y2="210" stroke="#5cb0ff" stroke-width="2.5" marker-end="url(#arrow)"></line>

  
  <g class="mono" font-size="12">
    
    <rect x="774" y="40" width="366" height="64" rx="11" fill="#121822" stroke="#2c3849"></rect>
    <circle cx="800" cy="72" r="6" fill="url(#blueGrad)"></circle>
    <text x="818" y="66" class="lbl h" font-size="14" fill="#eef1f5">Local Maestro</text>
    <text x="818" y="88" fill="#8a93a1">Serial2 · GPIO6 · 115200 — servos</text>

    
    <rect x="774" y="116" width="366" height="64" rx="11" fill="#121822" stroke="#2c3849"></rect>
    <circle cx="800" cy="148" r="6" fill="url(#blueGrad)"></circle>
    <text x="818" y="142" class="lbl h" font-size="14" fill="#eef1f5">Remote Maestros · WCB boards</text>
    <text x="818" y="164" fill="#8a93a1">ESP-NOW broadcast / unicast (Kyber)</text>

    
    <rect x="774" y="192" width="366" height="64" rx="11" fill="#121822" stroke="#2c3849"></rect>
    <circle cx="800" cy="224" r="6" fill="url(#blueGrad)"></circle>
    <text x="818" y="218" class="lbl h" font-size="14" fill="#eef1f5">HCR vocalizer</text>
    <text x="818" y="240" fill="#8a93a1">S3/S4 serial · or WCB unicast — sound</text>

    
    <rect x="774" y="268" width="366" height="64" rx="11" fill="#121822" stroke="#2c3849"></rect>
    <circle cx="800" cy="300" r="6" fill="url(#blueGrad)"></circle>
    <text x="818" y="294" class="lbl h" font-size="14" fill="#eef1f5">MP3 Trigger</text>
    <text x="818" y="316" fill="#8a93a1">local S3/S4 · or WCB unicast — audio</text>

    
    <rect x="774" y="344" width="366" height="64" rx="11" fill="#121822" stroke="#2c3849"></rect>
    <circle cx="800" cy="376" r="6" fill="url(#blueGrad)"></circle>
    <text x="818" y="370" class="lbl h" font-size="14" fill="#eef1f5">Raw serial</text>
    <text x="818" y="392" fill="#8a93a1">S3 (GPIO15) · S4 (GPIO17) — any device</text>
  </g>

  
  <g stroke="#3a5170" stroke-width="2" fill="none">
    <path d="M772 210 H758 V72 H774" marker-end="url(#arrow)"></path>
    <path d="M772 210 H766 V148 H774" marker-end="url(#arrow)"></path>
    <path d="M772 210 H774" marker-end="url(#arrow)"></path>
    <path d="M772 210 H766 V300 H774" marker-end="url(#arrow)"></path>
    <path d="M772 210 H758 V376 H774" marker-end="url(#arrow)"></path>
  </g>

  
  <g class="mono" font-size="12" fill="#6c7686">
    <line x1="40" y1="470" x2="78" y2="470" stroke="#5cb0ff" stroke-width="2.5" marker-end="url(#arrow)"></line>
    <text x="86" y="474">wired / decoded data path</text>
    <line x1="320" y1="470" x2="358" y2="470" stroke="#8b94a1" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrowS)"></line>
    <text x="366" y="474">RF / passthrough</text>
    <line x1="560" y1="470" x2="598" y2="470" stroke="#3a5170" stroke-width="2" marker-end="url(#arrow)"></line>
    <text x="606" y="474">dispatched action</text>
  </g>
  <text x="40" y="516" class="mono" font-size="12" fill="#5d6573">Every output is chosen per button-tap / switch-position / knob in the config tool — up to 5 actions per tap tier, 3 tap tiers, 3 modes.</text>
</svg>